<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@revivejs/client-errors basic example</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font: 15px/1.6 system-ui, sans-serif;
      }
      main {
        width: min(100%, 720px);
        padding: 24px;
      }
      button {
        padding: 12px 16px;
        border: 0;
        border-radius: 12px;
        background: #dc2626;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      pre {
        padding: 16px;
        border-radius: 16px;
        background: #0f172a;
        color: #e2e8f0;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>@revivejs/client-errors basic example</h1>
      <p>This page initializes the SDK with a local absolute endpoint and lets you trigger a manual exception.</p>
      <button id="trigger">Capture exception</button>
      <pre><code id="output">No request sent yet.</code></pre>
      <script type="module" src="./main.js"></script>
    </main>
  </body>
</html>
